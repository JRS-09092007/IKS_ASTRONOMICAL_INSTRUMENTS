<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nadivalaya Yantra - High Contrast Simulator</title>
<style>
  :root {
    --bg-panel: rgba(15, 23, 42, 0.85);
    --border-panel: rgba(14, 165, 233, 0.3);
    --text-main: #f8fafc;
    --text-dim: #94a3b8;
    --accent: #0ea5e9;
    --accent-glow: rgba(14, 165, 233, 0.5);
    --warn: #f59e0b;
    --font-ui: 'Segoe UI', system-ui, sans-serif;
  }
  
  body {
    margin: 0;
    overflow: hidden;
    background: #090e17;
    font-family: var(--font-ui);
    color: var(--text-main);
    user-select: none;
  }

  canvas {
    display: block;
    width: 100vw;
    height: 100vh;
  }

  /* Glassmorphism Panels */
  .panel {
    background: var(--bg-panel);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border-panel);
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    position: absolute;
    z-index: 10;
  }

  /* Header */
  .header {
    top: 24px;
    left: 24px;
    padding: 20px 28px;
    pointer-events: none;
  }
  .title {
    font-size: 24px;
    font-weight: 800;
    color: var(--text-main);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
    text-shadow: 0 0 10px var(--accent-glow);
  }
  .subtitle {
    font-size: 13px;
    color: var(--accent);
    letter-spacing: 2px;
    font-weight: 600;
    text-transform: uppercase;
  }

  /* Dashboard */
  .dashboard {
    top: 24px;
    right: 24px;
    padding: 20px;
    width: 280px;
  }
  
  .status-badge {
    background: rgba(14, 165, 233, 0.15);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 8px;
    text-align: center;
    border-radius: 8px;
    font-weight: 700;
    letter-spacing: 1px;
    margin-bottom: 20px;
    text-transform: uppercase;
    font-size: 14px;
    box-shadow: 0 0 15px var(--accent-glow) inset;
  }

  .status-badge.south {
    border-color: var(--warn);
    color: var(--warn);
    background: rgba(245, 158, 11, 0.15);
    box-shadow: 0 0 15px rgba(245, 158, 11, 0.3) inset;
  }

  .data-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  
  .data-item {
    background: rgba(255, 255, 255, 0.03);
    padding: 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  
  .data-label {
    font-size: 10px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  
  .data-val {
    font-size: 18px;
    font-weight: 700;
    font-family: monospace;
  }

  /* Controls */
  .controls {
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    padding: 24px;
    width: 90%;
    max-width: 600px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .slider-container {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  
  .slider-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    width: 50px;
    text-align: right;
    letter-spacing: 1px;
  }
  
  .slider-value {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    width: 70px;
    font-family: monospace;
  }

  input[type=range] {
    flex: 1;
    -webkit-appearance: none;
    height: 6px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    box-shadow: 0 0 15px var(--accent-glow);
    transition: 0.2s;
  }
  input[type=range]::-webkit-slider-thumb:hover {
    transform: scale(1.2);
    background: #fff;
  }

  .buttons {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 8px;
  }
  
  button {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--text-main);
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  
  button:hover {
    background: rgba(14, 165, 233, 0.2);
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  button.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    box-shadow: 0 0 15px var(--accent-glow);
  }

  #hint {
    position: absolute;
    bottom: 160px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 12px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.4);
    pointer-events: none;
    transition: opacity 0.5s;
  }

</style>
</head>
<body>

<canvas id="view"></canvas>
<div id="hint">DRAG TO ROTATE SCENE</div>

<div class="header panel">
  <div class="title">Nadivalaya Yantra</div>
  <div class="subtitle">Equatorial Sundial Animation</div>
</div>

<div class="dashboard panel">
  <div id="ui-face" class="status-badge">North Face Active</div>
  
  <div class="data-grid">
    <div class="data-item">
      <div class="data-label">Sun Declination</div>
      <div class="data-val" id="ui-dec">--°</div>
    </div>
    <div class="data-item">
      <div class="data-label">Hour Angle</div>
      <div class="data-val" id="ui-ha">--°</div>
    </div>
    <div class="data-item">
      <div class="data-label">Sun Altitude</div>
      <div class="data-val" id="ui-alt">--°</div>
    </div>
    <div class="data-item">
      <div class="data-label">Sun Azimuth</div>
      <div class="data-val" id="ui-az">--°</div>
    </div>
  </div>
</div>

<div class="controls panel">
  <div class="slider-container">
    <div class="slider-label">TIME</div>
    <input type="range" id="time-slider" min="4" max="20" step="0.1" value="12">
    <div class="slider-value" id="ui-time">12:00</div>
  </div>
  
  <div class="slider-container">
    <div class="slider-label">DATE</div>
    <input type="range" id="date-slider" min="1" max="365" step="1" value="172">
    <div class="slider-value" id="ui-date">Jun 21</div>
  </div>

  <div class="buttons">
    <button id="btn-anim" onclick="toggleAnimation()">▶ ANIMATE DAY</button>
    <button onclick="setCamera('north')">NORTH VIEW</button>
    <button onclick="setCamera('south')">SOUTH VIEW</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ═══════════════════════════════════════════════════════════════════
   NADIVALAYA YANTRA (Equatorial Sundial)
   - High Contrast Rendering
   - Real mathematical solar positioning
   - Jaipur Coordinates
═══════════════════════════════════════════════════════════════════ */

// CONSTANTS
const LATITUDE = 26.9239; // Jaipur
const RADIUS = 15;
const THICKNESS = 4;
const GNOMON_L = 12;

// THREE.JS GLOBALS
let scene, camera, renderer, sunLight, ambientLight;
let yantraGroup;
let isAnimating = false;
let currentDate = new Date(new Date().getFullYear(), 5, 21, 12, 0, 0); // Default to Summer Solstice
let currentDayOfYear = 172;

// CAMERA CONTROLS
const cams = {
  north: { r: 60, theta: Math.PI/4, phi: Math.PI/3, tx: 0, ty: 10, tz: 0 },
  south: { r: 60, theta: Math.PI + Math.PI/4, phi: Math.PI/3, tx: 0, ty: 10, tz: 0 }
};
let camState = { ...cams.north };
let targetCam = { ...cams.north };
let mouse = { isDown: false, x: 0, y: 0 };

// INITIALIZATION
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050a15); // Deep space blue
  scene.fog = new THREE.FogExp2(0x050a15, 0.005);

  camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);

  renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('view'), antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap; // Softer, cleaner shadows
  
  // Lighting
  ambientLight = new THREE.AmbientLight(0xffffff, 0.2); // Low ambient for contrast
  scene.add(ambientLight);

  sunLight = new THREE.DirectionalLight(0xfff5e6, 2.5); // Bright warm sun
  sunLight.castShadow = true;
  sunLight.shadow.mapSize.width = 2048;
  sunLight.shadow.mapSize.height = 2048;
  sunLight.shadow.camera.near = 10;
  sunLight.shadow.camera.far = 200;
  const d = 40;
  sunLight.shadow.camera.left = -d; sunLight.shadow.camera.right = d;
  sunLight.shadow.camera.top = d; sunLight.shadow.camera.bottom = -d;
  sunLight.shadow.bias = -0.001;
  scene.add(sunLight);

  // Add a visual sun sphere
  sunMesh = new THREE.Mesh(
    new THREE.SphereGeometry(4, 32, 32),
    new THREE.MeshBasicMaterial({ color: 0xffdd88 })
  );
  scene.add(sunMesh);

  // Build the Environment and Yantra
  buildEnvironment();
  buildNadivalaya();

  // Events
  window.addEventListener('resize', onResize);
  setupInteraction();
  
  // Start loop
  updateSolarSystem();
  animate();
}

// 2D CANVAS TEXTURE GENERATOR for HIGH CONTRAST DIAL
function createDialTexture(isNorth) {
  const size = 2048;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const cx = size / 2;
  const cy = size / 2;
  const r = size / 2 - 20;

  // Background - White marble look
  ctx.fillStyle = '#f8fafc';
  ctx.fillRect(0, 0, size, size);

  // Outer rings
  ctx.strokeStyle = '#0f172a'; // Very dark slate
  ctx.lineWidth = 8;
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
  ctx.lineWidth = 4;
  ctx.beginPath(); ctx.arc(cx, cy, r - 40, 0, Math.PI * 2); ctx.stroke();
  
  // Draw Hour markings
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  
  for (let i = 0; i < 24; i++) {
    // 15 degrees per hour
    // Nadivalaya dials are read with 12 at bottom (or top depending on design). 
    // We'll place 12 Noon at the bottom so shadow points to it.
    let angle = (i * 15) * Math.PI / 180;
    
    // Reverse direction for South face so numbers read correctly
    if (!isNorth) angle = -angle;

    const x1 = cx + Math.sin(angle) * (r - 40);
    const y1 = cy - Math.cos(angle) * (r - 40);
    const x2 = cx + Math.sin(angle) * r;
    const y2 = cy - Math.cos(angle) * r;

    ctx.lineWidth = i % 6 === 0 ? 8 : 4;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();

    // Text labels (using 24 hr format or 12 hr)
    const textRad = r - 100;
    const tx = cx + Math.sin(angle) * textRad;
    const ty = cy - Math.cos(angle) * textRad;
    
    // Rotate text to face center
    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(angle);
    ctx.fillStyle = '#0f172a';
    ctx.font = 'bold 64px Georgia';
    let displayHr = (i + 12) % 24;
    if(displayHr === 0) displayHr = 24;
    ctx.fillText(displayHr.toString(), 0, 0);
    ctx.restore();
  }

  const tex = new THREE.CanvasTexture(canvas);
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}

// 3D CONSTRUCTION
function buildEnvironment() {
  // Base ground
  const groundGeo = new THREE.PlaneGeometry(300, 300);
  const groundMat = new THREE.MeshStandardMaterial({ 
    color: 0x1e293b, // Dark slate
    roughness: 0.8, 
    metalness: 0.1 
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);
  
  // Grid helper for scale
  const grid = new THREE.GridHelper(300, 30, 0x334155, 0x1e293b);
  grid.position.y = 0.1;
  scene.add(grid);
}

function buildNadivalaya() {
  yantraGroup = new THREE.Group();
  scene.add(yantraGroup);

  // 1. The Pedestal / Stand
  const standGeo = new THREE.BoxGeometry(12, 25, 12);
  const stoneMat = new THREE.MeshStandardMaterial({
    color: 0xe2e8f0, // Light slate/stone
    roughness: 0.7,
  });
  const stand = new THREE.Mesh(standGeo, stoneMat);
  stand.position.y = 12.5;
  stand.castShadow = true;
  stand.receiveShadow = true;
  yantraGroup.add(stand);

  // 2. The Equatorial Dial Body
  const dialGroup = new THREE.Group();
  // Move to top of stand
  dialGroup.position.set(0, 26, 0);
  
  // To make it parallel to Equator:
  // Celestial pole is tilted by LATITUDE from North horizon (-Z)
  // We align the cylinder along Z axis initially.
  // Tilt up by LATITUDE.
  dialGroup.rotation.x = LATITUDE * Math.PI / 180;

  yantraGroup.add(dialGroup);

  // The main stone cylinder
  const cylinderGeo = new THREE.CylinderGeometry(RADIUS, RADIUS, THICKNESS, 64);
  const cylinder = new THREE.Mesh(cylinderGeo, stoneMat);
  // Cylinder naturally goes along Y, rotate to align with Z
  cylinder.rotation.x = Math.PI / 2; 
  cylinder.castShadow = true;
  cylinder.receiveShadow = true;
  dialGroup.add(cylinder);

  // 3. Dial Faces (North and South)
  const faceGeo = new THREE.CircleGeometry(RADIUS - 0.5, 64);
  
  const northMat = new THREE.MeshStandardMaterial({ map: createDialTexture(true), roughness: 0.4 });
  const northFace = new THREE.Mesh(faceGeo, northMat);
  northFace.position.z = -THICKNESS / 2 - 0.01; 
  northFace.rotation.y = Math.PI; // Face outwards (-Z)
  northFace.receiveShadow = true;
  dialGroup.add(northFace);

  const southMat = new THREE.MeshStandardMaterial({ map: createDialTexture(false), roughness: 0.4 });
  const southFace = new THREE.Mesh(faceGeo, southMat);
  southFace.position.z = THICKNESS / 2 + 0.01;
  // Faces outwards (+Z)
  southFace.receiveShadow = true;
  dialGroup.add(southFace);

  // 4. Gnomons (Pegs)
  const gnomonGeo = new THREE.CylinderGeometry(0.3, 0.5, GNOMON_L, 16);
  const bronzeMat = new THREE.MeshStandardMaterial({
    color: 0xb45309, // Dark amber/bronze
    metalness: 0.8,
    roughness: 0.2
  });

  const northGnomon = new THREE.Mesh(gnomonGeo, bronzeMat);
  northGnomon.rotation.x = Math.PI / 2;
  northGnomon.position.z = -(THICKNESS/2 + GNOMON_L/2);
  northGnomon.castShadow = true;
  northGnomon.receiveShadow = true;
  dialGroup.add(northGnomon);

  const southGnomon = new THREE.Mesh(gnomonGeo, bronzeMat);
  southGnomon.rotation.x = Math.PI / 2;
  southGnomon.position.z = (THICKNESS/2 + GNOMON_L/2);
  southGnomon.castShadow = true;
  southGnomon.receiveShadow = true;
  dialGroup.add(southGnomon);
}

// MATH & PHYSICS
function updateSolarSystem() {
  const rad = Math.PI / 180;
  
  // Approximate Declination based on day of year
  // Formula: \delta = -23.44^\circ * \cos( (360/365) * (N + 10) )
  const decDeg = -23.44 * Math.cos( (360/365) * (currentDayOfYear + 10) * rad );
  const decRad = decDeg * rad;

  // Hour Angle
  // 12:00 -> 0 HA. 06:00 -> -90 HA. 18:00 -> +90 HA.
  const hours = currentDate.getHours() + currentDate.getMinutes()/60;
  const haDeg = (hours - 12) * 15;
  const haRad = haDeg * rad;

  // Altitude & Azimuth
  const latRad = LATITUDE * rad;
  
  const sinAlt = Math.sin(latRad)*Math.sin(decRad) + Math.cos(latRad)*Math.cos(decRad)*Math.cos(haRad);
  const altRad = Math.asin(sinAlt);
  const altDeg = altRad / rad;

  let cosAz = (Math.sin(decRad) - Math.sin(latRad)*Math.sin(altRad)) / (Math.cos(latRad)*Math.cos(altRad));
  cosAz = Math.max(-1, Math.min(1, cosAz)); // Clamp
  let azRad = Math.acos(cosAz);
  if (Math.sin(haRad) > 0) azRad = 2*Math.PI - azRad;
  const azDeg = azRad / rad;

  // Update UI
  document.getElementById('ui-dec').innerText = decDeg.toFixed(2) + '°';
  document.getElementById('ui-ha').innerText = haDeg.toFixed(2) + '°';
  document.getElementById('ui-alt').innerText = altDeg.toFixed(2) + '°';
  document.getElementById('ui-az').innerText = azDeg.toFixed(2) + '°';

  const badge = document.getElementById('ui-face');
  if (altDeg < 0) {
    badge.innerText = "NIGHT TIME (NO SHADOW)";
    badge.className = "status-badge";
    badge.style.color = "#64748b";
    badge.style.borderColor = "#64748b";
    sunLight.intensity = 0;
    ambientLight.intensity = 0.05;
  } else {
    sunLight.intensity = 2.5;
    ambientLight.intensity = 0.2;
    if (decDeg >= 0) {
      badge.innerText = "NORTH FACE ACTIVE (SUMMER)";
      badge.className = "status-badge";
      badge.style.color = ""; badge.style.borderColor = "";
    } else {
      badge.innerText = "SOUTH FACE ACTIVE (WINTER)";
      badge.className = "status-badge south";
      badge.style.color = ""; badge.style.borderColor = "";
    }
  }

  // 3D Sun Position
  const dist = 150;
  const sx = dist * Math.cos(altRad) * Math.sin(azRad);
  const sy = dist * Math.sin(altRad);
  const sz = -dist * Math.cos(altRad) * Math.cos(azRad);
  
  sunLight.position.set(sx, sy, sz);
  sunMesh.position.set(sx, sy, sz);
}

// CONTROLS & ANIMATION
function setupInteraction() {
  const tSlider = document.getElementById('time-slider');
  const dSlider = document.getElementById('date-slider');

  tSlider.addEventListener('input', (e) => {
    isAnimating = false;
    document.getElementById('btn-anim').classList.remove('active');
    let hrs = parseFloat(e.target.value);
    currentDate.setHours(Math.floor(hrs), (hrs%1)*60, 0);
    updateDateUI();
    updateSolarSystem();
  });

  dSlider.addEventListener('input', (e) => {
    isAnimating = false;
    document.getElementById('btn-anim').classList.remove('active');
    currentDayOfYear = parseInt(e.target.value);
    const start = new Date(currentDate.getFullYear(), 0, 1);
    currentDate = new Date(start.getTime() + (currentDayOfYear - 1)*86400000);
    currentDate.setHours(Math.floor(tSlider.value), (tSlider.value%1)*60, 0);
    updateDateUI();
    updateSolarSystem();
  });

  // Mouse Drag Camera
  const canvas = document.getElementById('view');
  const hint = document.getElementById('hint');
  
  canvas.addEventListener('mousedown', (e) => {
    mouse.isDown = true; mouse.x = e.clientX; mouse.y = e.clientY;
    hint.style.opacity = '0';
  });
  window.addEventListener('mouseup', () => mouse.isDown = false);
  window.addEventListener('mousemove', (e) => {
    if(!mouse.isDown) return;
    const dx = e.clientX - mouse.x;
    const dy = e.clientY - mouse.y;
    mouse.x = e.clientX; mouse.y = e.clientY;
    
    targetCam.theta -= dx * 0.01;
    targetCam.phi -= dy * 0.01;
    targetCam.phi = Math.max(0.01, Math.min(Math.PI/2, targetCam.phi));
  });

  // Touch 
  canvas.addEventListener('touchstart', (e) => {
    mouse.isDown = true; mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY;
    hint.style.opacity = '0';
  });
  window.addEventListener('touchend', () => mouse.isDown = false);
  window.addEventListener('touchmove', (e) => {
    if(!mouse.isDown) return;
    const dx = e.touches[0].clientX - mouse.x;
    const dy = e.touches[0].clientY - mouse.y;
    mouse.x = e.touches[0].clientX; mouse.y = e.touches[0].clientY;
    targetCam.theta -= dx * 0.01;
    targetCam.phi -= dy * 0.01;
    targetCam.phi = Math.max(0.01, Math.min(Math.PI/2, targetCam.phi));
  });

  updateDateUI();
}

function updateDateUI() {
  const timeStr = currentDate.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12:false});
  const dateStr = currentDate.toLocaleDateString('en-US', {month:'short', day:'numeric'});
  document.getElementById('ui-time').innerText = timeStr;
  document.getElementById('ui-date').innerText = dateStr;
  
  const hrs = currentDate.getHours() + currentDate.getMinutes()/60;
  document.getElementById('time-slider').value = hrs;
  document.getElementById('date-slider').value = currentDayOfYear;
}

function toggleAnimation() {
  isAnimating = !isAnimating;
  const btn = document.getElementById('btn-anim');
  if(isAnimating) {
    btn.classList.add('active');
    btn.innerText = "⏸ PAUSE";
  } else {
    btn.classList.remove('active');
    btn.innerText = "▶ ANIMATE DAY";
  }
}

function setCamera(viewName) {
  targetCam = { ...cams[viewName] };
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);

  if (isAnimating) {
    // Increment time by 2 minutes per frame
    currentDate = new Date(currentDate.getTime() + 120000);
    const hrs = currentDate.getHours() + currentDate.getMinutes()/60;
    if(hrs >= 20) {
      // Loop back to morning
      currentDate.setHours(4, 0, 0);
    }
    updateDateUI();
    updateSolarSystem();
  }

  // Smooth camera interpolation
  camState.theta += (targetCam.theta - camState.theta) * 0.1;
  camState.phi += (targetCam.phi - camState.phi) * 0.1;
  camState.r += (targetCam.r - camState.r) * 0.1;
  camState.tx += (targetCam.tx - camState.tx) * 0.1;
  camState.ty += (targetCam.ty - camState.ty) * 0.1;
  camState.tz += (targetCam.tz - camState.tz) * 0.1;

  const cx = camState.tx + camState.r * Math.sin(camState.phi) * Math.sin(camState.theta);
  const cy = camState.ty + camState.r * Math.cos(camState.phi);
  const cz = camState.tz + camState.r * Math.sin(camState.phi) * Math.cos(camState.theta);

  camera.position.set(cx, cy, cz);
  camera.lookAt(camState.tx, camState.ty, camState.tz);

  renderer.render(scene, camera);
}

init();
</script>
